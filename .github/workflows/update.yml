name: Makkah Bot Cloud

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install Latest Dependencies
        # هنا نقوم بتحديث المكتبة لأحدث إصدار لتجنب حظر يوتيوب
        run: |
          pip install -U yt-dlp google-generativeai opencv-python-headless

      - name: Create Cookies
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run Bot
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python monitor.py

      - name: Push Changes
        run: |
          git config --global user.name "Makkah-Bot"
          git config --global user.email "bot@github.com"
          git add status.json
          git commit -m "Automated status update" || exit 0
          git push
