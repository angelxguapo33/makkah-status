name: Makkah Status Cloud Bot

on:
  schedule:
    - cron: '*/15 * * * *' # تشغيل آلي كل 15 دقيقة
  workflow_dispatch: # زر تشغيل يدوي للتجربة

jobs:
  build:
    runs-on: ubuntu-latest
    
    # السماح للبوت بالكتابة والرفع إلى المستودع
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install google-generativeai yt-dlp opencv-python-headless

      - name: Create Cookies File
        # هنا نقوم بإنشاء ملف الكوكيز من "السر" الذي وضعته في الإعدادات
        run: echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Run Monitor Script
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python monitor.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Makkah-Bot-Server"
          git config --global user.email "bot@github-action.com"
          git add status.json
          git commit -m "تحديث آلي للحالة من السحاب" || exit 0
          git push
